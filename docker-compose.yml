services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soiree_plateau_prod
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/soiree_plateau_prod
      # Génère une valeur avec: mix phx.gen.secret  (ou place-la dans un fichier .env)
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in a .env file (mix phx.gen.secret)}
      PHX_HOST: localhost
      PORT: "4000"
    ports:
      - "4000:4000"

volumes:
  db_data:
